services:
  postgres:
    image: postgres:16-alpine
    container_name: wc26-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wc26_user
      POSTGRES_PASSWORD: wc26_dev_password
      POSTGRES_DB: wc26
    ports:
      - "5433:5432"
    volumes:
      - wc26_postgres_data:/var/lib/postgresql/data

  # PgAdmin: A web-based GUI for the database
  pgadmin:
    image: dpage/pgadmin4
    container_name: wc26-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wc26.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - wc26_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  wc26_postgres_data:
  wc26_pgadmin_data:
