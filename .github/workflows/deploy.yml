name: Deploy to production

# Trigger: every push to main. Also allow manual runs from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping deploys — if you push twice quickly, the older
# run is cancelled so they don't race to deploy to the same VM.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/adelachour/wc26-backend

jobs:

  # ============================================================
  # JOB 1 — Compile, build the image, push to GHCR
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # needed to push to GHCR

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compile and build (gate before image build)
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon shadowJar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 2 — Deploy to the VM over SSH
  # ============================================================
  deploy:
    needs: build-and-push        # only runs if job 1 succeeded
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Copy compose file to the VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deployment/docker-compose.prod.yml
          target: /home/ubuntu/wc26-deploy-tmp
          strip_components: 1

      - name: Deploy on the VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Move the freshly-copied compose file into place
            cp /home/ubuntu/wc26-deploy-tmp/docker-compose.prod.yml /home/ubuntu/wc26/docker-compose.prod.yml
            cd /home/ubuntu/wc26

            # Pull the new image and restart the stack
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # Remove old dangling images to keep disk usage down
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Give the app a moment to come up, then check it responds.
            # Retry a few times before declaring failure.
            for i in $(seq 1 10); do
              if curl -fsS http://localhost:8080/ > /dev/null; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              echo "Attempt $i: app not ready yet, waiting..."
              sleep 5
            done
            echo "Health check FAILED — app did not respond after 50s"
            exit 1